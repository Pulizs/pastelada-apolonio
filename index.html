<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento do Pastel | Adquira seu Ingresso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .bg-royal-blue { background-color: #002366; }
        .text-gold { color: #C5A059; }
        .bg-gold { background-color: #C5A059; }
        .border-gold { border-color: #C5A059; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center">
    <header class="w-full bg-royal-blue py-6 shadow-2xl border-b-4 border-gold text-center">
        <h1 class="text-white text-3xl font-extrabold tracking-widest uppercase">
            Grande Evento do <span class="text-gold">Pastel</span>
        </h1>
    </header>

    <main class="w-full max-w-lg p-4 mt-8">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div class="bg-gray-50 p-6 border-b border-gray-100">
                <h2 class="text-xl font-bold text-royal-blue">Garanta seu Ingresso! 🥟</h2>
                <p class="text-gray-500 text-sm">Preencha os dados abaixo para gerar seu PIX.</p>
            </div>

            <form id="formCompra" class="p-6 space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Seu nome"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-900 outline-none transition">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">WhatsApp</label>
                    <input type="tel" id="whatsapp" required placeholder="(00) 00000-0000"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-900 outline-none transition">
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <label class="block text-sm font-semibold text-gray-700">Escolha o Pedido:</label>
                    <div class="flex flex-col gap-3">
                        <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-blue-50 transition border-gray-200" id="labelUnidade">
                            <input type="radio" name="item" value="unidade" checked class="w-5 h-5 text-blue-900">
                            <div class="ml-3">
                                <span class="block font-bold">Pastel Avulso</span>
                                <span class="text-sm text-gray-600">R$ 10,00</span>
                            </div>
                        </label>
                        <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-blue-50 transition border-gray-200" id="labelCombo">
                            <input type="radio" name="item" value="combo" class="w-5 h-5 text-blue-900">
                            <div class="ml-3">
                                <span class="block font-bold">Combo Master</span>
                                <span class="text-sm text-gray-600 font-medium">Pastel + Refri - R$ 15,00</span>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-royal-blue text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:brightness-125 transition active:scale-95">
                    GERAR PAGAMENTO PIX
                </button>
            </form>

            <div id="areaPix" class="hidden p-6 bg-blue-50 border-t-2 border-gold text-center animate-pulse-once">
                <h3 class="font-bold text-royal-blue text-lg">Quase lá!</h3>
                <p class="text-sm text-gray-600 mb-4">Escaneie o QR Code abaixo ou use a chave PIX:</p>
                
                <div class="bg-white p-3 rounded-lg border border-dashed border-royal-blue mb-4 select-all">
                    <code class="text-xs font-bold text-royal-blue">capitulo880@demolayparana.org.br</code>
                </div>

                <div id="qrcode" class="bg-white p-4 inline-block rounded-xl shadow-inner mb-4"></div>
                
                <div class="bg-gold/10 p-3 rounded-lg">
                    <p class="text-[10px] text-gray-700 uppercase font-bold tracking-tighter">
                        Apresente este código no dia para validação.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="script/vendas.js"></script>
</body>
</html>
