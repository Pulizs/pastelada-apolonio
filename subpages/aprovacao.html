<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aprovação de Pagamentos | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-royal-blue { background-color: #002366; }
        .text-gold { color: #C5A059; }
        .border-gold { border-color: #C5A059; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-royal-blue p-5 text-white shadow-xl border-b-4 border-gold">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-black tracking-tighter text-xl">APROVAÇÃO <span class="text-gold">PIX</span></h1>
            <div class="flex gap-3">
                <a href="tesoureiro.html" class="text-sm bg-white/10 px-4 py-2 rounded-lg hover:bg-white/20 transition">Ver Dashboard</a>
                <button onclick="fazerLogout()" class="text-sm bg-white/10 px-4 py-2 rounded-lg hover:bg-white/20 transition">Sair</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-gray-600 font-bold uppercase text-sm tracking-widest">Aguardando Conferência</h2>
            <span id="contadorPendentes" class="bg-royal-blue text-white px-3 py-1 rounded-full text-xs">0 pedidos</span>
        </div>

        <div id="listaPendentes" class="space-y-4">
            <div class="animate-pulse text-center py-10 text-gray-400">Carregando pedidos...</div>
        </div>
    </main>

    <script src="../script/admin-auth.js"></script>
    <script type="module" src="../script/aprovacao.js"></script>
</body>
</html>
