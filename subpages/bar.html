<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Bar | Evento Pastel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <nav class="bg-[#002366] p-4 text-white shadow-lg border-b-4 border-[#C5A059]">
        <h1 class="font-bold uppercase tracking-widest text-center">Controle de Bar 🥤</h1>
    </nav>

    <main class="p-4 max-w-xl mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-md mb-6">
            <p class="text-xs font-bold text-gray-400 mb-2 uppercase">Entregar Bebida do Combo</p>
            <div class="flex gap-2">
                <input type="text" id="inputBuscaBar" placeholder="Nome do Cliente..." class="flex-1 border p-3 rounded-xl outline-none focus:border-[#C5A059]">
                <button onclick="buscarPedidoBar()" class="bg-[#C5A059] text-white px-6 rounded-xl font-bold">VER</button>
            </div>
        </div>

        <div id="resultadoBar" class="hidden bg-white p-8 rounded-3xl border-2 border-dashed border-blue-200 text-center">
            <h2 id="nomeClienteBar" class="text-2xl font-black text-[#002366]">---</h2>
            <div id="badgeCombo" class="inline-block bg-amber-100 text-amber-700 px-4 py-1 rounded-full text-sm font-bold mt-2">
                COMBO ATIVO 🥤+🥟
            </div>
            <p class="text-gray-500 mt-4 text-sm font-medium">Verifique se o cliente já retirou o pastel no caixa.</p>
            <button onclick="confirmarEntregaBebida()" class="w-full mt-6 bg-[#002366] text-white py-4 rounded-xl font-bold shadow-lg">
                ENTREGAR BEBIDA
            </button>
        </div>
    </main>
    <script type="module" src="../script/admin.js"></script>
</body>
</html>
