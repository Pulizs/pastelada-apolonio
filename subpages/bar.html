<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Bar | Evento Pastel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-royal-blue { background-color: #002366; }
        .text-gold { color: #C5A059; }
        .bg-gold { background-color: #C5A059; }
        .border-gold { border-color: #C5A059; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-royal-blue p-5 text-white shadow-xl border-b-4 border-gold">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-black tracking-tighter text-xl">CONTROLE <span class="text-gold">BAR 🥤</span></h1>
            <button onclick="fazerLogout()" class="text-sm bg-white/10 px-4 py-2 rounded-lg hover:bg-white/20 transition">Sair</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6">
        <!-- Seção de Vendas -->
        <div class="bg-white rounded-3xl shadow-lg overflow-hidden border border-gray-200 mb-6">
            <div class="bg-gray-50 p-6 border-b border-gray-100">
                <h2 class="text-xl font-bold text-royal-blue">Registrar Venda de Bebida 🥤</h2>
                <p class="text-gray-500 text-sm">Selecione a quantidade e confirme a venda</p>
            </div>

            <div class="p-6 space-y-6">
                <!-- Água -->
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-200">
                    <div class="flex justify-between items-center mb-3">
                        <div>
                            <h3 class="font-bold text-royal-blue text-lg">💧 Água</h3>
                            <p class="text-gold font-bold">R$ 3,00</p>
                        </div>
                        <div class="flex items-center gap-3 bg-white rounded-xl px-4 py-2 border-2 border-blue-200">
                            <button onclick="diminuir('agua')" class="font-bold text-xl text-royal-blue hover:bg-blue-100 px-2 py-1 rounded">-</button>
                            <span id="qtdAgua" class="font-bold text-lg w-6 text-center">0</span>
                            <button onclick="aumentar('agua')" class="font-bold text-xl text-royal-blue hover:bg-blue-100 px-2 py-1 rounded">+</button>
                        </div>
                    </div>
                    <button onclick="adicionarCarrinho('agua', 'Água', 3)" class="w-full bg-blue-500 text-white py-2 rounded-xl font-bold hover:bg-blue-600 transition">
                        ADICIONAR AO CARRINHO
                    </button>
                </div>

                <!-- Refri Lata -->
                <div class="bg-red-50 p-4 rounded-2xl border border-red-200">
                    <div class="flex justify-between items-center mb-3">
                        <div>
                            <h3 class="font-bold text-royal-blue text-lg">🥤 Refri Lata</h3>
                            <p class="text-gold font-bold">R$ 5,00</p>
                        </div>
                        <div class="flex items-center gap-3 bg-white rounded-xl px-4 py-2 border-2 border-red-200">
                            <button onclick="diminuir('refri')" class="font-bold text-xl text-royal-blue hover:bg-red-100 px-2 py-1 rounded">-</button>
                            <span id="qtdRefri" class="font-bold text-lg w-6 text-center">0</span>
                            <button onclick="aumentar('refri')" class="font-bold text-xl text-royal-blue hover:bg-red-100 px-2 py-1 rounded">+</button>
                        </div>
                    </div>
                    <button onclick="adicionarCarrinho('refri', 'Refri Lata', 5)" class="w-full bg-red-500 text-white py-2 rounded-xl font-bold hover:bg-red-600 transition">
                        ADICIONAR AO CARRINHO
                    </button>
                </div>

                <!-- Suco Lata -->
                <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-200">
                    <div class="flex justify-between items-center mb-3">
                        <div>
                            <h3 class="font-bold text-royal-blue text-lg">🧃 Suco Lata</h3>
                            <p class="text-gold font-bold">R$ 5,00</p>
                        </div>
                        <div class="flex items-center gap-3 bg-white rounded-xl px-4 py-2 border-2 border-yellow-200">
                            <button onclick="diminuir('suco')" class="font-bold text-xl text-royal-blue hover:bg-yellow-100 px-2 py-1 rounded">-</button>
                            <span id="qtdSuco" class="font-bold text-lg w-6 text-center">0</span>
                            <button onclick="aumentar('suco')" class="font-bold text-xl text-royal-blue hover:bg-yellow-100 px-2 py-1 rounded">+</button>
                        </div>
                    </div>
                    <button onclick="adicionarCarrinho('suco', 'Suco Lata', 5)" class="w-full bg-yellow-500 text-white py-2 rounded-xl font-bold hover:bg-yellow-600 transition">
                        ADICIONAR AO CARRINHO
                    </button>
                </div>
            </div>
        </div>

        <!-- Carrinho -->
        <div class="bg-white rounded-3xl shadow-lg overflow-hidden border border-gray-200">
            <div class="bg-gray-50 p-6 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-xl font-bold text-royal-blue">Carrinho</h2>
                <span id="contadorCarrinho" class="bg-royal-blue text-white px-3 py-1 rounded-full text-xs font-bold">0 itens</span>
            </div>

            <div id="listaProdutos" class="p-6 space-y-3">
                <p class="text-center text-gray-400 py-10">Carrinho vazio. Adicione bebidas acima.</p>
            </div>

            <div class="bg-gray-50 p-6 border-t border-gray-100 space-y-3">
                <div class="flex justify-between items-center text-lg font-bold text-royal-blue">
                    <span>Total:</span>
                    <span id="totalCarrinho">R$ 0,00</span>
                </div>
                <button id="btnConfirmar" onclick="confirmarVenda()" class="w-full bg-royal-blue text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:brightness-125 transition active:scale-95" disabled>
                    CONFIRMAR VENDA
                </button>
            </div>
        </div>
    </main>

    <script src="../script/admin-auth.js"></script>
    <script type="module" src="../script/bar.js"></script>
</body>
</html>
