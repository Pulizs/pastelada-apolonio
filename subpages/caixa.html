<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Validador | Área do Caixa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .bg-royal-blue { background-color: #002366; }
        .bg-gold { background-color: #C5A059; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-royal-blue p-4 text-white flex justify-between items-center shadow-md">
        <span class="font-bold tracking-tighter">PAINEL DO CAIXA</span>
        <a href="../index.html" class="text-xs border border-white/30 px-2 py-1 rounded">Sair</a>
    </nav>

    <div class="max-w-xl mx-auto p-4">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden mb-6 border-4 border-royal-blue">
            <div id="reader" class="w-full"></div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg">
            <h2 class="text-sm font-bold text-gray-400 uppercase mb-4 tracking-widest">Busca Manual</h2>
            <div class="flex gap-2">
                <input type="text" id="inputBusca" placeholder="Nome ou Telefone..." 
                    class="flex-1 bg-gray-50 border-2 border-gray-100 p-3 rounded-xl focus:border-gold outline-none">
                <button class="bg-gold text-white px-6 rounded-xl font-bold">BUSCAR</button>
            </div>
        </div>

        <div id="statusCard" class="mt-6 hidden bg-white p-6 rounded-2xl border-l-8 border-green-500 shadow-xl">
            <div class="flex justify-between items-start">
                <div>
                    <h3 id="resNome" class="text-2xl font-black text-royal-blue uppercase">JOÃO DA SILVA</h3>
                    <p id="resTipo" class="text-gold font-bold">COMBO PASTEL + REFRI</p>
                    <p id="resTel" class="text-gray-400 text-sm">(41) 99999-9999</p>
                </div>
                <span class="bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full uppercase">Pago</span>
            </div>
            <button class="w-full mt-6 bg-royal-blue text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200">
                CONFIRMAR ENTREGA
            </button>
        </div>
    </div>
</body>
</html>
