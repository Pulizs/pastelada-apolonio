<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-royal-blue { background-color: #002366; }
        .text-gold { color: #C5A059; }
        .bg-gold { background-color: #C5A059; }
        .border-gold { border-color: #C5A059; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
            <div class="bg-royal-blue p-8 text-center">
                <h1 class="text-white text-3xl font-extrabold tracking-widest">
                    <span class="text-gold">ADMIN</span>
                </h1>
                <p class="text-white/60 text-sm mt-2">Acesso Restrito - DeMolay</p>
            </div>

            <form id="formLogin" class="p-8 space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Senha de Acesso</label>
                    <input type="password" id="senha" required placeholder="Digite a senha"
                        class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-royal-blue focus:ring-2 focus:ring-royal-blue outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Selecione a Função</label>
                    <select id="funcao" required class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-royal-blue focus:ring-2 focus:ring-royal-blue outline-none transition">
                        <option value="">-- Escolha uma opção --</option>
                        <option value="aprovacao">Aprovação de Pagamentos</option>
                        <option value="caixa">Painel do Caixa</option>
                        <option value="bar">Controle do Bar</option>
                        <option value="tesoureiro">Dashboard Financeiro</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-royal-blue text-white py-3 rounded-lg font-bold text-lg shadow-lg hover:brightness-125 transition active:scale-95">
                    ACESSAR
                </button>

                <p class="text-center text-gray-500 text-xs">
                    Senha padrão: <strong>admin123</strong>
                </p>
            </form>
        </div>

        <div class="mt-6 text-center">
            <a href="../index.html" class="text-royal-blue font-semibold hover:text-gold transition">
                ← Voltar para Vendas
            </a>
        </div>
    </div>

    <script type="module" src="../script/auth.js"></script>
</body>
</html>
